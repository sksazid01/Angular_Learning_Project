<h1>Access Data from Parent Component</h1>

<div *ngIf="receivedAddress; else noAddress">
<h2>Address Received in Parent</h2>
<pre>{{ receivedAddress | json }}</pre>
</div>
<ng-template #noAddress>
<p>No address submitted yet.</p>
</ng-template>

<app-location-selector (addressSubmit)="onAddressSubmit($event)"></app-location-selector>

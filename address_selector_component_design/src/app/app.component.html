<div *ngIf="isLoading$ | async" class="global-loader" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.45);
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
  ">
  <div style="
      background: white;
      color: black;
      padding: 24px 36px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    ">
    Loading, please wait...
  </div>
</div>

<h1>Access Data from Parent Component</h1>

<div *ngIf="receivedAddress; else noAddress">
  <h2>Address Received in Parent</h2>
  <pre>{{ receivedAddress | json }}</pre>
</div>

<ng-template #noAddress>
  <p>No address submitted yet.</p>
</ng-template>

<app-location-selector (addressSubmit)="onAddressSubmit($event)">
</app-location-selector>

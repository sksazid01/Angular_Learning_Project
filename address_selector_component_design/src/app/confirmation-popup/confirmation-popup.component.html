<div *ngIf="isOpen && config" class="popup-overlay" (click)="onCancel()">
  <div class="popup-content" (click)="$event.stopPropagation()">
    <div class="popup-header" *ngIf="config.title">
      <h3>{{ config.title }}</h3>
      <button class="close-btn" (click)="onCancel()">&times;</button>
    </div>
    <div class="popup-body">
      <p>{{ config.message }}</p>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" type="button" (click)="onCancel()">{{ config.cancelText }}</button>
      <button class="btn-confirm" type="button" (click)="onConfirm()">{{ config.confirmText }}</button>
    </div>
  </div>
</div>
